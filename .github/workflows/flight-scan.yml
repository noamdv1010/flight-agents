name: flight-scan

on:
  schedule:
    - cron: "0 */4 * * *"        # every 4 hours, UTC
  workflow_dispatch:              # allow manual trigger from the Actions tab

permissions:
  contents: write                 # needed to commit state.json back

concurrency:
  group: flight-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run flight agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python flight_agent.py

      - name: Commit updated state
        run: |
          git config user.name  "flight-agent-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: update state [skip ci]"
            git push
          else
            echo "no state change"
          fi
