# Flight Agent — watchlist configuration
# Edit this file to tune what the agent hunts for.

origin: TLV                  # IATA code of home airport
currency: USD
min_score: 8                 # only alert when LLM scores deal >= this (1-10)
trip_length_days: [3, 14]    # min, max trip length the scanner will sample (≥3 days = ≥2 nights)
date_window_days: 120        # how far out (days) to scan departures
samples_per_destination: 2   # number of (depart,return) pairs to sample per dest per run
cabin_class: economy         # economy | premium_economy | business | first
adults: 1

# Each destination gets its own price ceiling.
# The hard filter drops anything above max_price_usd before the LLM ever sees it.
#
# Budget ceilings: maximum $400 round-trip per destination.
destinations:
  # --- existing destinations (kept per request) ---
  - { code: LON, max_price_usd: 400 }   # London (UK)
  - { code: PAR, max_price_usd: 400 }   # Paris (France)
  - { code: BCN, max_price_usd: 400 }   # Barcelona (Spain)
  - { code: ROM, max_price_usd: 400 }   # Rome (Italy)
  - { code: ATH, max_price_usd: 400 }   # Athens (Greece)
  - { code: BKK, max_price_usd: 400 }   # Bangkok (Thailand)
  - { code: TYO, max_price_usd: 400 }   # Tokyo (Japan)
  - { code: NYC, max_price_usd: 400 }   # New York (USA)

  # --- expanded European hubs/cities ---
