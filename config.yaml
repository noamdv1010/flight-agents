# Flight Agent — watchlist configuration
# Edit this file to tune what the agent hunts for.

origin: TLV                  # IATA code of home airport
currency: USD
min_score: 8                 # only alert when LLM scores deal >= this (1-10)
trip_length_days: [3, 14]    # min, max trip length the scanner will sample (≥3 days = ≥2 nights)
date_window_days: 120        # how far out (days) to scan departures
samples_per_destination: 5   # (depart,return) pairs per dest per run — biased toward long weekends
cabin_class: economy         # economy | premium_economy | business | first
adults: 1

# Each destination gets its own price ceiling.
# The hard filter drops anything above max_price_usd before the LLM ever sees it.
#
# Budget ceilings — highly selective:
#   * European destinations: $250 round-trip
#   * Long-haul: BKK $550, TYO $650, NYC $500
destinations:
  # --- existing destinations (kept per request) ---
  - { code: LON, max_price_usd: 250 }   # London (UK)
  - { code: PAR, max_price_usd: 250 }   # Paris (France)
  - { code: BCN, max_price_usd: 250 }   # Barcelona (Spain)
  - { code: ROM, max_price_usd: 250 }   # Rome (Italy)
  - { code: ATH, max_price_usd: 250 }   # Athens (Greece)
  - { code: BKK, max_price_usd: 550 }   # Bangkok (Thailand) — long-haul
  - { code: TYO, max_price_usd: 650 }   # Tokyo (Japan) — long-haul
  - { code: NYC, max_price_usd: 500 }   # New York (USA) — long-haul

  # --- expanded European hubs/cities ---
  # Western Europe
  - { code: AMS, max_price_usd: 250 }   # Amsterdam (Netherlands)
  - { code: BRU, max_price_usd: 250 }   # Brussels (Belgium)
  - { code: DUB, max_price_usd: 250 }   # Dublin (Ireland)
  - { code: LIS, max_price_usd: 250 }   # Lisbon (Portugal)
  - { code: MAD, max_price_usd: 250 }   # Madrid (Spain)
  - { code: NCE, max_price_usd: 250 }   # Nice (France)

  # Central Europe & DACH
  - { code: BER, max_price_usd: 250 }   # Berlin (Germany)
  - { code: FRA, max_price_usd: 250 }   # Frankfurt (Germany)
  - { code: MUC, max_price_usd: 250 }   # Munich (Germany)
  - { code: VIE, max_price_usd: 250 }   # Vienna (Austria)
  - { code: ZRH, max_price_usd: 250 }   # Zurich (Switzerland)
  - { code: GVA, max_price_usd: 250 }   # Geneva (Switzerland)
  - { code: PRG, max_price_usd: 250 }   # Prague (Czech Republic)

  # Eastern Europe
  - { code: WAW, max_price_usd: 250 }   # Warsaw (Poland)
  - { code: BUD, max_price_usd: 250 }   # Budapest (Hungary)
  - { code: OTP, max_price_usd: 250 }   # Bucharest (Romania)
  - { code: SOF, max_price_usd: 250 }   # Sofia (Bulgaria)

  # Southern Europe
  - { code: MIL, max_price_usd: 250 }   # Milan (Italy)

  # Nordics
  - { code: CPH, max_price_usd: 250 }   # Copenhagen (Denmark)
  - { code: ARN, max_price_usd: 250 }   # Stockholm (Sweden)
  - { code: OSL, max_price_usd: 250 }   # Oslo (Norway)
  - { code: HEL, max_price_usd: 250 }   # Helsinki (Finland)

  # Major hub on the Europe/Asia bridge (Turkey accepts Israeli passport holders)
  - { code: IST, max_price_usd: 250 }   # Istanbul (Turkey)

  # Greek islands — direct seasonal flights, very popular Israeli vacation routes.
  # Ceilings tightened below European mainland because peak-season package deals
  # (טיסה + מלון) start around $270 — so flight-only must clearly beat that.
  - { code: HER, max_price_usd: 220 }   # Heraklion (Crete East — main airport)
  - { code: CHQ, max_price_usd: 220 }   # Chania (Crete West)
  - { code: RHO, max_price_usd: 220 }   # Rhodes
  - { code: CFU, max_price_usd: 240 }   # Corfu
  - { code: JTR, max_price_usd: 260 }   # Santorini (premium island)
  - { code: JMK, max_price_usd: 260 }   # Mykonos (premium island)

  # Balkans — short flights from TLV, beautiful coast/mountains, still relatively
  # underrated by Israeli mass tourism → real deal potential.
  - { code: TIV, max_price_usd: 230 }   # Tivat (Montenegro — Kotor Bay gateway, beach/mountains)
  - { code: TGD, max_price_usd: 220 }   # Podgorica (Montenegro — capital, year-round flights)
